version: "3.9"

# ============================================================
# Agent Development Stack
#   • agent-dev  — Python 3.13 dev container
#   • postgres   — PostgreSQL 16
#   • pgadmin    — Web UI for Postgres (optional, port 5050)
# ============================================================

services:

  # ── Agent Dev Container ────────────────────────────────────
  agent-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: agent-dev
    hostname: agent-dev
    restart: unless-stopped

    volumes:
      # Mount your local code into the container (live editing)
      - ./workspace:/workspace
      # Persist pip cache to speed up rebuilds
      - pip-cache:/home/agentdev/.cache/pip
      # Persist shell history
      - shell-history:/home/agentdev/.local/share

    environment:
      # PostgreSQL connection
      - DATABASE_URL=postgresql://agentdev:agentdev@postgres:5432/agentdb
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=agentdb
      - POSTGRES_USER=agentdev
      - POSTGRES_PASSWORD=agentdev

      # LLM API keys — set in .env file (never commit!)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}

      # Dev settings
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENVIRONMENT=development

    ports:
      - "8000:8000"   # FastAPI / uvicorn
      - "7860:7860"   # Gradio
      - "8080:8080"   # Streamlit or misc
      - "8888:8888"   # Jupyter

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - agent-net

    # Keep container alive for VS Code Remote attach
    command: sleep infinity

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    hostname: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: agentdb
      POSTGRES_USER: agentdev
      POSTGRES_PASSWORD: agentdev
      # Tune for development (not production!)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

    ports:
      - "5432:5432"   # Expose to host for tools like DBeaver / TablePlus

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentdev -d agentdb"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - agent-net

  # ── pgAdmin (optional, comment out if not needed) ──────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agent-pgadmin
    restart: unless-stopped
    profiles:
      - tools   # start with: docker compose --profile tools up

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agentdev.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - agent-net

# ── Named volumes ──────────────────────────────────────────────
volumes:
  postgres-data:
  pip-cache:
  shell-history:

# ── Network ────────────────────────────────────────────────────
networks:
  agent-net:
    driver: bridge
